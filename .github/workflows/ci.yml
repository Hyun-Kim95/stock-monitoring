name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://stock:stock@localhost:5432/stock_monitoring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
